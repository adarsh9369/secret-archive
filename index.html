<!DOCTYPE html>
<html>
<head>
  <title>Secure Archive</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    #login {
      margin-top: 120px;
    }

    #mainContent {
      display: none;
      padding: 20px;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: #22c55e;
      color: black;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    img {
      width: 260px;
      border-radius: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Secure Archive Access</h2>
  <p>Enter Access Key</p>

  <input type="password" id="pass" placeholder="Access Key">
  <br><br>

  <button onclick="checkPass()">Unlock</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
  <h1>Happy Birthday ❤️</h1>

  <img src="photo.jpg" alt="photo">

  <p>You are my happiness 💕</p>

  <button onclick="showMessage()">Open Message</button>
  <p id="msg"></p>
</div>

<script>
function checkPass() {
  let password = document.getElementById("pass").value.trim();

  if (password === "8853") {
    document.getElementById("login").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Access Denied ❌";
  }
}

function showMessage() {
  document.getElementById("msg").innerText =
  "You are the best thing in my life ❤️ Stay with me forever 💖";
}
</script>

</body>
</html>
