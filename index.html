<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Archive</title>
    <style>
        /* CSS styles start */
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e94560;
            --primary: #0f3460;
            --secondary: #16213e;
            --input-bg: #fff;
            --button-bg: #e94560;
            --button-hover: #d1304b;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('photo.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Dark overlay to ensure text is always readable over the photo */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: opacity 0.5s ease-in-out;
        }

        .hidden {
            display: none !important;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .login-box h1 {
            color: var(--text-color);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .input-group {
            display: flex;
            margin-top: 25px;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--text-color);
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: var(--button-bg);
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        .error {
            color: #ff4757;
            margin-top: 15px;
            font-size: 14px;
            animation: shake 0.4s ease-in-out both;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .surprise-box {
            text-align: center;
            max-width: 800px;
            width: 90%;
            padding: 40px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            max-height: 90vh;
            overflow-y: auto;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .surprise-box h1 {
            color: var(--text-color);
            font-size: 3rem;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(233, 69, 96, 0.5);
        }

        .images-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .image-box {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            object-fit: cover;
            /* Ensures the image fits the square perfectly */
            background: rgba(255, 255, 255, 0.05);
        }

        .image-box:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--text-color);
            box-shadow: 0 15px 25px rgba(233, 69, 96, 0.4);
        }

        .message-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 12px;
            min-height: 120px;
            text-align: left;
            font-size: 1.2rem;
            line-height: 1.8;
            border-left: 4px solid var(--text-color);
            position: relative;
        }

        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .drive-btn {
            display: inline-block;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        .drive-btn:hover {
            background: var(--button-bg);
            border-color: var(--button-hover);
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(233, 69, 96, 0.4);
        }

        .music-control {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
        }

        #music-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #music-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
        }

        #music-btn.playing {
            background: rgba(233, 69, 96, 0.8);
            border-color: transparent;
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 1s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .delay-1 {
            animation-delay: 0.8s;
        }

        .delay-2 {
            animation-delay: 1.6s;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            bottom: -100px;
            color: var(--text-color);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            animation: floatHeart linear infinite, pulse 2s ease-in-out infinite alternate;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        @media (max-width: 600px) {
            .images-container {
                flex-direction: column;
                align-items: center;
            }

            .image-box {
                width: 100%;
                max-width: 250px;
            }

            .surprise-box h1 {
                font-size: 2.2rem;
            }

            .message-container {
                font-size: 1.1rem;
            }
        }

        /* CSS styles end */
    </style>
</head>

<body>
    <div id="login-container" class="container">
        <div class="login-box">
            <h1>Secure Archive</h1>
            <p>Access restricted. Please enter the master password.</p>
            <div class="input-group">
                <input type="password" id="password-input" placeholder="Password...">
                <button id="login-btn">Unlock</button>
            </div>
            <p id="error-msg" class="hidden error">Incorrect password. Access denied.</p>
        </div>
    </div>

    <div id="main-content" class="container hidden">
        <div class="music-control">
            <button id="music-btn">🎵 Play Music</button>
            <audio id="bg-music" loop>
                <!-- Add a placeholder audio src, user can drop in their own -->
                <source src="music.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="surprise-box">
            <h1 class="fade-in">Happy Birthday! 🎉</h1>
            <div class="images-container fade-in delay-1">
                <!-- Mobile-friendly button to open the Google Drive folder -->
                <a href="https://drive.google.com/drive/folders/1hE5GLRhtuaz5Rns1WxXAllfMWx-irJXo" target="_blank"
                    class="drive-btn">📁 Open Photo Gallery</a>
            </div>
            <div class="message-container fade-in delay-2">
                <p id="typing-text"></p>
            </div>
        </div>
    </div>

    <script>
        // JS logic start
        document.addEventListener('DOMContentLoaded', () => {
            const loginContainer = document.getElementById('login-container');
            const mainContent = document.getElementById('main-content');
            const passwordInput = document.getElementById('password-input');
            const loginBtn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const bgMusic = document.getElementById('bg-music');
            const musicBtn = document.getElementById('music-btn');
            const typingText = document.getElementById('typing-text');

            const MASTER_PASSWORD = 'happybirthday';
            const HIDDEN_MESSAGE = "Wishing you the happiest of birthdays! 🌟 Here's a tiny digital archive celebrating you. May this year bring you endless joy, beautiful memories, and countless smiles. You mean the world to me.";

            // Logic for Login Validation
            function attemptLogin() {
                const enteredPassword = passwordInput.value.trim().toLowerCase();
                if (enteredPassword === MASTER_PASSWORD) {
                    // Success
                    loginContainer.style.opacity = '0';
                    setTimeout(() => {
                        loginContainer.classList.add('hidden');
                        mainContent.classList.remove('hidden');

                        // Play music if possible
                        bgMusic.volume = 0.4;
                        bgMusic.play().then(() => {
                            musicBtn.innerHTML = '⏸️ Pause';
                            musicBtn.classList.add('playing');
                        }).catch(() => {
                            console.log("Browser autoplay blocked. User must interact to play audio.");
                        });

                        startTypingEffect();
                        startFloatingHearts();

                        // Opacity animation for main content
                        mainContent.style.opacity = '0';
                        setTimeout(() => mainContent.style.opacity = '1', 50);
                    }, 500); // Wait for fade out
                } else {
                    // Failure
                    errorMsg.classList.remove('hidden');
                    passwordInput.value = '';

                    // Remove animation to retrigger it
                    errorMsg.style.animation = 'none';
                    errorMsg.offsetHeight; /* trigger reflow */
                    errorMsg.style.animation = null;
                }
            }

            loginBtn.addEventListener('click', attemptLogin);
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') attemptLogin();
            });

            // Music Control
            musicBtn.addEventListener('click', () => {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicBtn.innerHTML = '⏸️ Pause';
                    musicBtn.classList.add('playing');
                } else {
                    bgMusic.pause();
                    musicBtn.innerHTML = '🎵 Play Music';
                    musicBtn.classList.remove('playing');
                }
            });

            // Typing Effect Logic
            function startTypingEffect() {
                typingText.innerHTML = '';
                typingText.classList.add('typing-cursor');

                // Wait for page animations before typing
                setTimeout(() => {
                    let i = 0;
                    function typeChar() {
                        if (i < HIDDEN_MESSAGE.length) {
                            typingText.innerHTML = HIDDEN_MESSAGE.substring(0, i + 1);
                            i++;
                            // Randomize typing speed slightly for realism
                            let typeSpeed = Math.random() * 40 + 30;
                            setTimeout(typeChar, typeSpeed);
                        } else {
                            // Remove cursor effect after typing finishes
                            setTimeout(() => {
                                typingText.classList.remove('typing-cursor');
                            }, 2000);
                        }
                    }
                    typeChar();
                }, 2200); // Waits ~2.2s
            }

            // Floating Hearts Logic for Ambient Background
            function startFloatingHearts() {
                setInterval(() => {
                    if (mainContent.classList.contains('hidden')) return;

                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = '❤';

                    // Random properties to make it organic
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = Math.random() * 3 + 5 + 's';
                    heart.style.opacity = Math.random() * 0.5 + 0.3;
                    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';

                    document.body.appendChild(heart);

                    // Cleanup
                    setTimeout(() => {
                        heart.remove();
                    }, 8000);
                }, 600);
            }
        });
        // JS logic end
    </script>
</body>

</html>
